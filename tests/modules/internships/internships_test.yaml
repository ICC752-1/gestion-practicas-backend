type: collection.insomnia.rest/5.0
schema_version: "5.1"
name: Internships API tests
meta:
  id: wrk_internships_api_tests
  created: 1781201000000
  modified: 1781201000000
  description: "Coleccion minima para QA manual del modulo internships."
collection:
  - name: Setup
    meta:
      id: fld_internships_setup
      created: 1781201000001
      modified: 1781201000001
      sortKey: -1781201000001
      description: "Logins y contexto previo para flujos de estudiante y decision administrativa."
    children:
      - name: POST Login estudiante demo
        url: "{{ _.base_url }}/auth/login"
        meta:
          id: req_internships_login_student
          created: 1781201000002
          modified: 1781201000002
          isPrivate: false
          description: "Guarda student_access_token y student_refresh_token."
          sortKey: -1781201000002
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "email": "{{ _.student_email }}",
              "password": "{{ _.test_password }}"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (body.access_token) {
              insomnia.environment.set("student_access_token", body.access_token);
            }
            if (body.refresh_token) {
              insomnia.environment.set("student_refresh_token", body.refresh_token);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - name: POST Login director demo
        url: "{{ _.base_url }}/auth/login"
        meta:
          id: req_internships_login_director
          created: 1781201000003
          modified: 1781201000003
          isPrivate: false
          description: "Guarda director_access_token para acciones de dashboard y resolucion."
          sortKey: -1781201000003
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "email": "{{ _.director_email }}",
              "password": "{{ _.test_password }}"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (body.access_token) {
              insomnia.environment.set("director_access_token", body.access_token);
              insomnia.environment.set("access_token", body.access_token);
            }
            if (body.refresh_token) {
              insomnia.environment.set("director_refresh_token", body.refresh_token);
              insomnia.environment.set("refresh_token", body.refresh_token);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
  - name: Happy path
    meta:
      id: fld_internships_happy
      created: 1781201000010
      modified: 1781201000010
      sortKey: -1781201000010
      description: "Flujo minimo de elegibilidad, creacion y lectura administrativa."
    children:
      - name: GET Registration Eligibility
        url: "{{ _.base_url }}/internships/registration-eligibility?internship_period=Semestre&internship_type=Práctica%20de%20Estudio%20I"
