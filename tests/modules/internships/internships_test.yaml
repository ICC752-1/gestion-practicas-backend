collection:
  - name: Setup
    meta:
      id: fld_internships_setup
      created: 1778800000100
      modified: 1778800000100
      sortKey: -1778800000100
      description: ""
    children:
      - name: POST Login estudiante semilla
        url: "{{ _.base_url }}/auth/login"
        meta:
          id: req_internships_auth_login_seed_user
          created: 1778800000001
          modified: 1778800000001
          isPrivate: false
          description: "Ejecutar primero. Guarda access_token en student_access_token."
          sortKey: -1778800000001
        method: POST
        body:
          mimeType: application/json
          text: >-
            {
              "email": "{{ _.test_email }}",
              "password": "{{ _.test_password }}"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: insomnia/12.5.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (body.access_token) {
              insomnia.environment.set("student_access_token", body.access_token);
            }
            if (body.refresh_token) {
              insomnia.environment.set("student_refresh_token", body.refresh_token);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true


      - name: POST Login director semilla
        url: "{{ _.base_url }}/auth/login"
        meta:
          id: req_internships_auth_login_seed_director
          created: 1778800000010
          modified: 1778800000010
          isPrivate: false
          description: "Guarda access_token en access_token y director_access_token para endpoints de dashboard."
          sortKey: -1778800000010
        method: POST
        body:
          mimeType: application/json
          text: >-
            {
              "email": "{{ _.director_email }}",
              "password": "{{ _.test_password }}"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: insomnia/12.5.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (body.access_token) {
              insomnia.environment.set("access_token", body.access_token);
              insomnia.environment.set("director_access_token", body.access_token);
            }
            if (body.refresh_token) {
              insomnia.environment.set("refresh_token", body.refresh_token);
              insomnia.environment.set("director_refresh_token", body.refresh_token);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true


