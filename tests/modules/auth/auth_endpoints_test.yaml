type: collection.insomnia.rest/5.0
schema_version: "5.1"
name: Auth API tests
meta:
  id: wrk_auth_api_tests
  created: 1781200000000
  modified: 1781200000000
  description: "Coleccion minima para QA manual del modulo auth."
collection:
  - name: Setup
    meta:
      id: fld_auth_setup
      created: 1781200000001
      modified: 1781200000001
      sortKey: -1781200000001
      description: "Requests auxiliares para guardar tokens y contexto base."
    children:
      - name: POST Login superadmin
        url: "{{ _.base_url }}/auth/login"
        meta:
          id: req_auth_login_superadmin
          created: 1781200000002
          modified: 1781200000002
          isPrivate: false
          description: "Guarda access_token y refresh_token base para requests administrativos."
          sortKey: -1781200000002
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "email": "{{ _.superadmin_email }}",
              "password": "{{ _.test_password }}"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (body.access_token) {
              insomnia.environment.set("access_token", body.access_token);
              insomnia.environment.set("superadmin_access_token", body.access_token);
            }
            if (body.refresh_token) {
              insomnia.environment.set("refresh_token", body.refresh_token);
              insomnia.environment.set("superadmin_refresh_token", body.refresh_token);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - name: POST Login estudiante demo
        url: "{{ _.base_url }}/auth/login"
        meta:
          id: req_auth_login_student
          created: 1781200000003
          modified: 1781200000003
          isPrivate: false
          description: "Guarda tokens del estudiante para comparar permisos y consultar /auth/me."
          sortKey: -1781200000003
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "email": "{{ _.student_email }}",
              "password": "{{ _.test_password }}"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (body.access_token) {
              insomnia.environment.set("student_access_token", body.access_token);
            }
            if (body.refresh_token) {
              insomnia.environment.set("student_refresh_token", body.refresh_token);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
  - name: Happy path
    meta:
      id: fld_auth_happy
      created: 1781200000010
      modified: 1781200000010
      sortKey: -1781200000010
      description: "Flujo base de inicio de sesion y persistencia de usuario actual."
    children:
      - name: POST Login
        url: "{{ _.base_url }}/auth/login"
        meta:
          id: req_auth_login
          created: 1781200000011
          modified: 1781200000011
          isPrivate: false
          description: "Login base del superadmin usando el contrato HTTP actual del backend."
          sortKey: -1781200000011
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "email": "{{ _.superadmin_email }}",
              "password": "{{ _.test_password }}"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (body.access_token) {
              insomnia.environment.set("access_token", body.access_token);
            }
            if (body.refresh_token) {
              insomnia.environment.set("refresh_token", body.refresh_token);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - name: GET Me
        url: "{{ _.base_url }}/auth/me"
        meta:
          id: req_auth_me
          created: 1781200000012
          modified: 1781200000012
          isPrivate: false
          description: "Valida la resolucion del usuario autenticado y sus roles."
          sortKey: -1781200000012
        method: GET
        headers:
          - name: Authorization
            value: "Bearer {{ _.access_token }}"
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - name: POST Refresh
        url: "{{ _.base_url }}/auth/refresh"
        meta:
          id: req_auth_refresh
          created: 1781200000013
          modified: 1781200000013
          isPrivate: false
          description: "Renueva tokens usando cookie de refresh y payload opcional."
          sortKey: -1781200000013
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "refresh_token": "{{ _.refresh_token }}"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (body.access_token) {
              insomnia.environment.set("access_token", body.access_token);
            }
            if (body.refresh_token) {
              insomnia.environment.set("refresh_token", body.refresh_token);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - name: POST Logout
        url: "{{ _.base_url }}/auth/logout"
        meta:
          id: req_auth_logout
          created: 1781200000014
          modified: 1781200000014
          isPrivate: false
          description: "Cierra la sesion remota y permite validar revocacion de refresh token."
          sortKey: -1781200000014
        method: POST
        body:
