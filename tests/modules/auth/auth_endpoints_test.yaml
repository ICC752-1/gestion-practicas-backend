          text: |-
            {
              "refresh_token": "{{ _.refresh_token }}"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
            value: "Bearer {{ _.access_token }}"
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
  - name: Errores esperados
    meta:
      id: fld_auth_errors
      created: 1781200000020
