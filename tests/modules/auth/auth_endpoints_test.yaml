          created: 1781200000021
          modified: 1781200000021
          isPrivate: false
          description: "Debe responder 401 si el password no coincide."
          sortKey: -1781200000021
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "email": "{{ _.superadmin_email }}",
              "password": "incorrect-password"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - name: GET Me (sin token)
        url: "{{ _.base_url }}/auth/me"
        meta:
          id: req_auth_me_without_token
          created: 1781200000022
          modified: 1781200000022
