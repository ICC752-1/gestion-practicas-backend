type: collection.insomnia.rest/5.0
schema_version: "5.1"
name: Documents API tests
meta:
  id: wrk_documents_api_tests
  created: 1781202000000
  modified: 1781202000000
  description: "Coleccion minima para QA manual del modulo documents."
collection:
  - name: Setup
    meta:
      id: fld_documents_setup
      created: 1781202000001
      modified: 1781202000001
      sortKey: -1781202000001
      description: "Logins y creacion de una practica base para probar subida y revision documental."
    children:
      - name: POST Login estudiante demo
        url: "{{ _.base_url }}/auth/login"
        meta:
          id: req_documents_login_student
          created: 1781202000002
          modified: 1781202000002
          isPrivate: false
          description: "Guarda student_access_token y student_refresh_token."
          sortKey: -1781202000002
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "email": "{{ _.student_email }}",
              "password": "{{ _.test_password }}"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (body.access_token) {
              insomnia.environment.set("student_access_token", body.access_token);
            }
            if (body.refresh_token) {
              insomnia.environment.set("student_refresh_token", body.refresh_token);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - name: POST Login secretaria demo
        url: "{{ _.base_url }}/auth/login"
        meta:
          id: req_documents_login_secretary
          created: 1781202000003
          modified: 1781202000003
          isPrivate: false
          description: "Guarda document_admin_access_token para revision y exportacion local DIRAE."
          sortKey: -1781202000003
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "email": "{{ _.document_admin_email }}",
              "password": "{{ _.test_password }}"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (body.access_token) {
              insomnia.environment.set("document_admin_access_token", body.access_token);
              insomnia.environment.set("access_token", body.access_token);
            }
            if (body.refresh_token) {
              insomnia.environment.set("document_admin_refresh_token", body.refresh_token);
              insomnia.environment.set("refresh_token", body.refresh_token);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - name: GET Document Types
        url: "{{ _.base_url }}/documents/types"
        meta:
          id: req_documents_types
          created: 1781202000004
          modified: 1781202000004
          isPrivate: false
          description: "Obtiene tipos activos y guarda el primer id en document_type_id."
          sortKey: -1781202000004
        method: GET
        headers:
          - name: Authorization
            value: "Bearer {{ _.student_access_token }}"
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (Array.isArray(body) && body.length > 0 && body[0].id) {
              insomnia.environment.set("document_type_id", body[0].id);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - name: POST Create Internship
        url: "{{ _.base_url }}/internships"
        meta:
          id: req_documents_create_internship
          created: 1781202000005
          modified: 1781202000005
          isPrivate: false
          description: "Crea una practica base y guarda internship_id."
          sortKey: -1781202000005
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "org_name": "Empresa Demo SpA",
              "sector": "Tecnologia",
              "address": "Av. Siempre Viva 123",
              "city": "Temuco",
              "org_phone": "+56912345678",
              "web": "https://empresa-demo.cl",
              "supervisor_name": "Ana Perez",
              "supervisor_profession": "Ingeniera Civil Informatica",
              "supervisor_position": "Jefa de Proyectos",
              "supervisor_department": "Tecnologia",
              "supervisor_email": "ana.perez@empresa-demo.cl",
              "supervisor_phone": "+56987654321",
              "start_date": "2026-06-01",
              "end_date": "2026-08-31",
              "schedule": "Lunes a viernes 09:00-18:00",
              "days": "Lunes, Martes, Miercoles, Jueves, Viernes",
              "modality": "Presencial",
              "internship_address": "Av. Siempre Viva 123, Temuco",
              "act_description": "Desarrollo y apoyo en mantencion de sistemas internos.",
              "ben_description": "Fortalecimiento de procesos digitales de la organizacion.",
              "amount": 150000,
              "internship_period": "Semestre",
              "internship_type": "Práctica de Estudio I"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
            value: "Bearer {{ _.student_access_token }}"
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (body.id) {
              insomnia.environment.set("internship_id", body.id);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
  - name: Happy path
    meta:
      id: fld_documents_happy
      created: 1781202000010
      modified: 1781202000010
      sortKey: -1781202000010
      description: "Flujo minimo de subida, listado, revision y descarga."
    children:
      - name: POST Upload Document
        url: "{{ _.base_url }}/internships/{{ _.internship_id }}/documents"
        meta:
          id: req_documents_upload
          created: 1781202000011
          modified: 1781202000011
          isPrivate: false
          description: "Carga un archivo fixture y guarda document_id."
          sortKey: -1781202000011
        method: POST
        body:
          mimeType: multipart/form-data
          params:
            - name: document_type_id
              value: "{{ _.document_type_id }}"
              disabled: false
            - name: file
              fileName: "{{ _.document_fixture_path }}"
              type: file
              disabled: false
        headers:
          - name: Authorization
            value: "Bearer {{ _.student_access_token }}"
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (body.id) {
              insomnia.environment.set("document_id", body.id);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - name: GET Internship Documents
        url: "{{ _.base_url }}/internships/{{ _.internship_id }}/documents"
        meta:
          id: req_documents_list
          created: 1781202000012
          modified: 1781202000012
          isPrivate: false
          description: "Lista documentos vigentes de la practica."
          sortKey: -1781202000012
        method: GET
        headers:
          - name: Authorization
            value: "Bearer {{ _.student_access_token }}"
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - name: PATCH Update Document Status
        url: "{{ _.base_url }}/documents/{{ _.document_id }}/status"
        meta:
          id: req_documents_update_status
          created: 1781202000013
          modified: 1781202000013
          isPrivate: false
          description: "Aprueba u observa un documento con rol administrativo documental."
          sortKey: -1781202000013
        method: PATCH
        body:
          mimeType: application/json
          text: |-
            {
              "status": "approved",
              "comment": "Documento revisado manualmente desde coleccion Insomnia"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
            value: "Bearer {{ _.document_admin_access_token }}"
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - name: GET Download Document
        url: "{{ _.base_url }}/documents/{{ _.document_id }}/download"
        meta:
          id: req_documents_download
          created: 1781202000014
          modified: 1781202000014
          isPrivate: false
          description: "Descarga autenticada del documento ya cargado."
          sortKey: -1781202000014
        method: GET
        headers:
          - name: Authorization
            value: "Bearer {{ _.student_access_token }}"
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
  - name: Errores esperados
    meta:
      id: fld_documents_errors
      created: 1781202000020
      modified: 1781202000020
      sortKey: -1781202000020
      description: "Casos minimos de autenticacion, rol y recurso inexistente."
    children:
      - name: GET Document Types (sin token)
        url: "{{ _.base_url }}/documents/types"
        meta:
          id: req_documents_types_without_token
          created: 1781202000021
          modified: 1781202000021
          isPrivate: false
          description: "Debe responder 401 cuando falta Authorization."
          sortKey: -1781202000021
        method: GET
        headers:
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - name: PATCH Update Document Status (rol incorrecto)
        url: "{{ _.base_url }}/documents/{{ _.document_id }}/status"
        meta:
          id: req_documents_wrong_role
          created: 1781202000022
          modified: 1781202000022
          isPrivate: false
          description: "Debe responder 403 si el estudiante intenta revisar su propio documento."
          sortKey: -1781202000022
        method: PATCH
        body:
          mimeType: application/json
          text: |-
            {
              "status": "approved",
              "comment": "Intento sin permisos"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
            value: "Bearer {{ _.student_access_token }}"
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - name: GET Download Document (404)
        url: "{{ _.base_url }}/documents/999999/download"
        meta:
          id: req_documents_download_404
          created: 1781202000023
          modified: 1781202000023
          isPrivate: false
          description: "Debe responder 404 cuando el documento no existe."
          sortKey: -1781202000023
        method: GET
        headers:
          - name: Authorization
            value: "Bearer {{ _.document_admin_access_token }}"
          - name: User-Agent
            value: insomnia/12.6.0
            disabled: false
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
cookieJar:
  name: Default Jar
  meta:
    id: jar_documents_api_tests
    created: 1781202000030
    modified: 1781202000030
environments:
  name: Base Environment
  meta:
    id: env_documents_api_tests
    created: 1781202000040
    modified: 1781202000040
    isPrivate: false
  data:
    base_url: http://127.0.0.1:8000
    test_password: demo-password
    student_email: estudiante.demo@ufromail.cl
    document_admin_email: secretaria.carrera@ufrontera.cl
    access_token: ""
    refresh_token: ""
    student_access_token: ""
    student_refresh_token: ""
    document_admin_access_token: ""
    document_admin_refresh_token: ""
    internship_id: ""
    document_type_id: ""
    document_id: ""
    document_fixture_path: tests/fixtures/documents/formulario.pdf
