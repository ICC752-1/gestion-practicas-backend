          sortKey: -1781050000003
        method: GET
        headers:
          - name: Authorization
            value: "Bearer {{ _.access_token }}"
          - name: User-Agent
            value: insomnia/12.5.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (Array.isArray(body) && body.length > 0 && body[0].id) {
              insomnia.environment.set("document_type_id", body[0].id);
            }
            if (Array.isArray(body)) {
              const requiredTypes = body.filter((type) => type.is_required);
              if (requiredTypes[0]?.id) {
                insomnia.environment.set("dirae_required_type_id", requiredTypes[0].id);
              }
              if (requiredTypes[1]?.id) {
                insomnia.environment.set("dirae_second_required_type_id", requiredTypes[1].id);
              }
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
