          description: "Ejecutar primero. Guarda access_token en student_access_token."
          sortKey: -1781050000001
        method: POST
        body:
          mimeType: application/x-www-form-urlencoded
          params:
            - name: username
              value: "{{ _.test_email }}"
              disabled: false
            - name: password
              value: "{{ _.test_password }}"
              disabled: false
        headers:
          - name: Content-Type
            value: application/x-www-form-urlencoded
          - name: User-Agent
            value: insomnia/12.5.0
            disabled: false
        scripts:
          afterResponse: |-
            const body = insomnia.response.json();

            if (body.access_token) {
              insomnia.environment.set("student_access_token", body.access_token);
            }
            if (body.refresh_token) {
              insomnia.environment.set("student_refresh_token", body.refresh_token);
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true

