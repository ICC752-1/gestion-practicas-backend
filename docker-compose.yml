services:
  db:
    image: postgres:15
    container_name: internship_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    # OJO: No se define "volumes" al final para que los datos mueran con el contenedor ya seran volatiles por el momento