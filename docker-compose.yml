services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: internship_backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - .:/app
      - /app/.venv
      - ./logs:/app/logs
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: internship_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./app/core/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    # OJO: No se define "volumes" al final para que los datos mueran con el contenedor ya seran volatiles por el momento
    restart: unless-stopped
